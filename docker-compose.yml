services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: yacht-sales-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sme_yacht_sales
      POSTGRES_USER: yacht_sales
      POSTGRES_PASSWORD: yacht_sales_dev_password
    ports:
      - "55433:5432"
    volumes:
      - yacht-sales-postgres-data:/var/lib/postgresql/data

volumes:
  yacht-sales-postgres-data:
